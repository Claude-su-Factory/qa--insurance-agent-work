services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ingestion-service:
    build: ./ingestion-service
    ports:
      - "8081:8081"
    env_file:
      - ./ingestion-service/.env
    volumes:
      - ./ingestion-service/config.toml:/app/config.toml
    depends_on:
      qdrant:
        condition: service_healthy
    restart: on-failure

  query-service:
    build: ./query-service
    ports:
      - "8082:8082"
    env_file:
      - ./query-service/.env
    depends_on:
      qdrant:
        condition: service_healthy
    restart: on-failure

  ui-service:
    build:
      context: ./ui-service
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    env_file:
      - ./ui-service/.env.local
    depends_on:
      - ingestion-service
      - query-service
    restart: on-failure

volumes:
  qdrant_data:
