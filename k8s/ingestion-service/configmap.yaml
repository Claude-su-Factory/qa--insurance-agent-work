apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-config
data:
  config.toml: |
    [server]
    port = 8081

    [qdrant]
    base_url = "http://qdrant:6333"
    collection = "insurance_clauses"

    [chunking]
    chunk_size = 512
    overlap = 50

    [embedding]
    model = "voyage-3"
    base_url = "https://api.voyageai.com/v1/embeddings"
