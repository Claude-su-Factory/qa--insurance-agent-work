apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-service
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: insurance-qa-agent-query-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: ANTHROPIC_API_KEY
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: VOYAGE_API_KEY
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: QDRANT_COLLECTION
              value: "insurance_clauses"
            - name: PORT
              value: "8082"
            - name: INTERNAL_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: INTERNAL_AUTH_TOKEN
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LANGFUSE_SECRET_KEY
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LANGFUSE_PUBLIC_KEY
            - name: LANGFUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: LANGFUSE_HOST
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: EVAL_CRON_ENABLED
              value: "true"
            - name: EVAL_CRON_SCHEDULE
              value: "0 3 * * 0"
            - name: EVAL_SAMPLE_SIZE
              value: "10"
            - name: EVAL_SKIP_IF_NO_NEW_SNAPSHOTS
              value: "true"
            - name: EVAL_AUTO_PROMOTE_BASELINE
              value: "true"
